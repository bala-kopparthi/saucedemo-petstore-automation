# =============================================================================
# pytest configuration — this is applicable for all pytest invocations
# =============================================================================

[pytest]

# --- Where to look for tests ---
# Both UI and API live in their own subtrees. Anything outside these is ignored.
testpaths =
    ui/tests
    api/tests

# --- Test discovery patterns (these are pytest defaults, shown for clarity) ---
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Markers ---
# --strict-markers (below in addopts) makes any unknown @pytest.mark.* an ERROR.
# Without that, a typo like @pytest.mark.smok would silently skip the test.
markers =
    smoke: critical-path sanity tests, must always pass on every push
    regression: full coverage suite, run on PR and nightly
    e2e: end-to-end user journey (login -> shop -> checkout -> confirm)
    ui: UI tests (Playwright + browser)
    api: API tests (Petstore Pet endpoints)
    negative: negative-path tests (invalid creds, locked users, malformed payloads)
    parametrize_users: tests parametrized across SauceDemo user types

# --- Default CLI options always applied ---
# --strict-markers: unknown markers = error, not silent skip
# --tb=short: shorter failure tracebacks (long ones drown the signal in noise)
# -ra: end-of-run summary of all non-passed tests (failures, errors, skips)
# --color=yes: keep colors even in CI logs that pipe output
addopts =
    --strict-markers
    --tb=short
    -ra
    --color=yes
