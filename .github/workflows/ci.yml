name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # nightly at 06:00 UTC (default branch only)

jobs:
  # ── P0: fast gate on every commit ─────────────────────────────────────
  smoke:
    name: Smoke (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium only)
        run: playwright install --with-deps chromium

      - name: Run smoke tests
        run: pytest -m smoke --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results

  # ── P1: cross-browser regression on PRs + nightly ────────────────────
  regression:
    name: Regression (cross-browser)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (all browsers)
        run: playwright install --with-deps

      - name: Run regression tests (Chromium + Firefox + WebKit)
        run: >
          pytest -m regression
          --browser chromium --browser firefox --browser webkit
          --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-regression
          path: allure-results

  # ── P2: negative/validation, Chromium-only on PRs + nightly ──────────
  validation:
    name: Validation (negative, Chromium)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium only)
        run: playwright install --with-deps chromium

      - name: Run negative tests
        run: pytest -m negative --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-validation
          path: allure-results
