name: CI

on:

  workflow_dispatch:        # adds a manual "Run workflow" button in the Actions tab
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # nightly at 06:00 UTC (default branch only)

# The publish job needs to write to the gh-pages branch.
permissions:
  contents: write

jobs:
  # ── P0: fast gate on every commit ─────────────────────────────────────
  smoke:
    name: Smoke (Chromium)
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: http://localhost:8080/v2
    services:
      petstore:
        image: swaggerapi/petstore
        env:
          SWAGGER_HOST: http://localhost:8080
          SWAGGER_URL: http://localhost:8080
          SWAGGER_BASE_PATH: /v2
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Wait for Petstore API to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v2/pet/1 || true)
            if [ "$code" != "000" ]; then
              echo "Petstore responding (HTTP $code)"
              exit 0
            fi
            echo "Waiting for Petstore... attempt $i"
            sleep 2
          done
          echo "Petstore did not become ready in time"
          exit 1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium only)
        run: playwright install --with-deps chromium

      - name: Run smoke tests
        run: pytest -m smoke --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-smoke
          path: allure-results

  # ── P1: cross-browser regression on PRs + nightly ────────────────────
  regression:
    name: Regression (cross-browser)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: http://localhost:8080/v2
    services:
      petstore:
        image: swaggerapi/petstore
        env:
          SWAGGER_HOST: http://localhost:8080
          SWAGGER_URL: http://localhost:8080
          SWAGGER_BASE_PATH: /v2
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (all browsers)
        run: playwright install --with-deps

      - name: Wait for Petstore API to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v2/pet/1 || true)
            if [ "$code" != "000" ]; then
              echo "Petstore responding (HTTP $code)"
              exit 0
            fi
            echo "Waiting for Petstore... attempt $i"
            sleep 2
          done
          echo "Petstore did not become ready in time"
          exit 1

      - name: Run regression tests (Chromium + Firefox + WebKit)
        run: >
          pytest -m regression
          --browser chromium --browser firefox --browser webkit
          --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-regression
          path: allure-results

  # ── P2: negative/validation, Chromium-only on PRs + nightly ──────────
  validation:
    name: Validation (negative, Chromium)
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: http://localhost:8080/v2
    services:
      petstore:
        image: swaggerapi/petstore
        env:
          SWAGGER_HOST: http://localhost:8080
          SWAGGER_URL: http://localhost:8080
          SWAGGER_BASE_PATH: /v2
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright (Chromium only)
        run: playwright install --with-deps chromium

      - name: Wait for Petstore API to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v2/pet/1 || true)
            if [ "$code" != "000" ]; then
              echo "Petstore responding (HTTP $code)"
              exit 0
            fi
            echo "Waiting for Petstore... attempt $i"
            sleep 2
          done
          echo "Petstore did not become ready in time"
          exit 1

      - name: Run negative tests
        run: pytest -m negative --browser chromium --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-validation
          path: allure-results

  # ── Publish the Allure report to GitHub Pages (with history) ──────────
  publish-report:
    name: Publish Allure report
    if: always()                 # publish even if tests failed or jobs were skipped
    needs: [smoke, regression, validation]
    runs-on: ubuntu-latest
    steps:
      - name: Download all Allure results
        uses: actions/download-artifact@v5
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Check out existing gh-pages branch (for history)
        uses: actions/checkout@v5
        continue-on-error: true   # first run: gh-pages doesn't exist yet — that's fine
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report with history
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Strip stray .git from the generated report
        run: sudo rm -rf allure-history/.git

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history